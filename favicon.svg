<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ls-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12121f"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="ls-mark" x1="24" y1="24" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f5ff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#bf00ff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="ls-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="ls-clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ls-clip)">
    <rect width="120" height="120" rx="26" fill="url(#ls-bg)"/>
    <rect x="20" y="20" width="80" height="80" rx="10" fill="url(#ls-mark)" stroke="#00f5ff" stroke-width="3.5" filter="url(#ls-glow)"/>
    <rect x="36" y="36" width="48" height="48" rx="4" stroke="#39ff14" stroke-width="2.5" stroke-opacity="0.72"/>
  </g>
</svg>
