{% extends "base.html" %}

{% block title %}Добавить промокод{% endblock %}

{% block content %}
<div class="admin-panel">
    <nav class="admin-breadcrumb mb-4">
        <a href="{{ url_for('admin', tab='promo') }}">← Промокоды</a>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">➕ Добавить промокод</h5>
        </div>
        <div class="card-body">
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Код промокода</label>
                    <input type="text" name="code" class="form-control" placeholder="SALE10" required maxlength="50">
                    <small class="text-muted">Будет сохранён в верхнем регистре</small>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Тип скидки</label>
                        <select name="discount_type" class="form-select" required>
                            <option value="percent">Процент (%)</option>
                            <option value="fixed">Фиксированная сумма (₽)</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Значение</label>
                        <input type="number" name="discount_value" class="form-control" step="0.01" min="0" required placeholder="10 или 500">
                        <small class="text-muted">% или ₽ в зависимости от типа</small>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Мин. сумма заказа (₽)</label>
                        <input type="number" name="min_order" class="form-control" step="0.01" min="0" value="0" placeholder="0">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Макс. использований</label>
                        <input type="number" name="max_uses" class="form-control" min="1" placeholder="Пусто = без лимита">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Действует с</label>
                        <input type="datetime-local" name="valid_from" class="form-control" placeholder="Пусто = сразу">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Действует до</label>
                        <input type="datetime-local" name="valid_until" class="form-control" placeholder="Пусто = бессрочно">
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" value="1" checked>
                    <label class="form-check-label" for="is_active">Активен</label>
                </div>
                <hr>
                <button type="submit" class="btn btn-success">➕ Добавить</button>
                <a href="{{ url_for('admin', tab='promo') }}" class="btn btn-outline-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
