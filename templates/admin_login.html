{% extends "base.html" %}

{% block title %}Вход в админку{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="card-title mb-4">🔐 Вход в админку</h4>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="{{ url_for('admin_login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="next_url" value="{{ next_url }}">
                    <div class="mb-3">
                        <label class="form-label">Ключ доступа</label>
                        <input type="password" name="key" class="form-control form-control-lg" placeholder="Введите ключ" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
                </form>
                <p class="mt-3 text-muted small mb-0">Ключ задаётся в config.py (ADMIN_SECRET)</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
