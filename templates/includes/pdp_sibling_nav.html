{% if prev_product or next_product %}
<nav class="pdp-sibling-nav d-flex justify-content-between mb-4" aria-label="Соседние товары">
    {% if prev_product %}
    <a href="{{ prev_product|product_url }}" class="btn btn-outline-secondary btn-sm">&larr; {{ prev_product.name|truncate(35) }}</a>
    {% else %}<span></span>{% endif %}
    {% if next_product %}
    <a href="{{ next_product|product_url }}" class="btn btn-outline-secondary btn-sm">{{ next_product.name|truncate(35) }} &rarr;</a>
    {% endif %}
</nav>
{% endif %}
