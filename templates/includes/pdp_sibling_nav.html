{% if prev_product or next_product or product.category %}
<nav class="pdp-sibling-nav d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4" aria-label="Соседние товары">
    {% if prev_product %}
    <a href="{{ prev_product|product_url }}" class="btn btn-outline-secondary btn-sm pdp-sibling-nav-prev">&larr; {{ prev_product.name|truncate(32) }}</a>
    {% else %}<span class="pdp-sibling-nav-spacer"></span>{% endif %}
    {% if product.category %}
    <a href="{{ url_for('catalog', category_slug=product.category.slug) }}" class="btn btn-link btn-sm text-muted pdp-sibling-nav-back">Назад к товарам</a>
    {% endif %}
    {% if next_product %}
    <a href="{{ next_product|product_url }}" class="btn btn-outline-secondary btn-sm pdp-sibling-nav-next">{{ next_product.name|truncate(32) }} &rarr;</a>
    {% else %}<span class="pdp-sibling-nav-spacer"></span>{% endif %}
</nav>
{% endif %}
