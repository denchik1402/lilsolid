<div class="modal fade" id="oneClickModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content store-modal">
            <div class="modal-header">
                <h5 class="modal-title">Покупка в 1 клик</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3" id="oneClickProductName"></p>
                <form id="oneClickForm">
                    <input type="hidden" name="product_id" id="oneClickProductId">
                    <div class="mb-3">
                        <label class="form-label">Ваше имя</label>
                        <input type="text" class="form-control" name="name" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" class="form-control" name="phone" required placeholder="+7 (999) 123-45-67">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                </form>
                <div id="oneClickError" class="alert alert-danger mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
