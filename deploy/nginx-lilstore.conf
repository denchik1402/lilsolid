# Nginx конфиг для LIL STORE (lilstore.ru)
# Скопировать: sudo cp deploy/nginx-lilstore.conf /etc/nginx/sites-available/lilstore
# Активировать: sudo ln -sf /etc/nginx/sites-available/lilstore /etc/nginx/sites-enabled/
# Проверить: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name lilstore.ru www.lilstore.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lilstore.ru www.lilstore.ru;

    ssl_certificate /etc/letsencrypt/live/lilstore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lilstore.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /home/lilstore/my_shop/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
