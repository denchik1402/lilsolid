# HTTP до SSL — lilsolid.ru
# sudo cp deploy/nginx-lilsolid-http.conf /etc/nginx/sites-available/lilsolid

server {
    listen 80;
    server_name lilsolid.ru www.lilsolid.ru;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml text/html;

    location = /favicon.svg {
        alias /home/lilstore/lilsolid/favicon.svg;
        default_type image/svg+xml;
        expires 7d;
    }
    location = /favicon.ico {
        alias /home/lilstore/lilsolid/favicon.ico;
        default_type image/x-icon;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /static/ {
        alias /home/lilstore/lilsolid/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
