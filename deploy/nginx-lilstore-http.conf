# Nginx для lilstore.ru — только HTTP (без SSL)
# Использовать если сертификат ещё не получен
# sudo cp deploy/nginx-lilstore-http.conf /etc/nginx/sites-available/lilstore

server {
    listen 80;
    server_name lilstore.ru www.lilstore.ru;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /home/lilstore/my_shop/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
