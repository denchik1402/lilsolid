# Временный конфиг ДО получения SSL (для certbot)
# Использовать только для первого запуска certbot
# После получения сертификата заменить на nginx-lilstore.conf

server {
    listen 80;
    server_name lilstore.ru www.lilstore.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/lilstore/my_shop/static/;
    }
}
