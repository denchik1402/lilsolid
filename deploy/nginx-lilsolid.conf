# HTTPS — lilsolid.ru (после certbot)

server {
    listen 80;
    server_name lilsolid.ru www.lilsolid.ru;

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        return 200 "User-agent: *\nAllow: /\nDisallow: /admin\nDisallow: /banner-click\nSitemap: https://lilsolid.ru/sitemap.xml\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name lilsolid.ru www.lilsolid.ru;

    ssl_certificate /etc/letsencrypt/live/lilsolid.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lilsolid.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        return 200 "User-agent: *\nAllow: /\nDisallow: /admin\nDisallow: /banner-click\nSitemap: https://lilsolid.ru/sitemap.xml\n";
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml text/html;

    location = /favicon.svg {
        alias /home/lilstore/lilsolid/favicon.svg;
        default_type image/svg+xml;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /favicon.png {
        alias /home/lilstore/lilsolid/favicon.png;
        default_type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /favicon.ico {
        alias /home/lilstore/lilsolid/favicon.ico;
        default_type image/x-icon;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /static/ {
        alias /home/lilstore/lilsolid/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
