# Nginx для работы по IP (без домена)
# Использовать если домена ещё нет
# sudo cp deploy/nginx-ip-only.conf /etc/nginx/sites-available/lilstore
# sudo ln -sf /etc/nginx/sites-available/lilstore /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 104.128.141.177 _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /home/lilstore/my_shop/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
